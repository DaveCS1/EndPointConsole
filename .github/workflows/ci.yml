name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EndPointConsole.sln

      - name: Build
        run: dotnet build EndPointConsole.sln -c Release --no-restore

      - name: Test
        run: dotnet test EndpointConsole.Tests/EndpointConsole.Tests.csproj -c Release --no-build

      - name: Build MSI
        run: EndpointConsole.Installer\build.bat Release
        shell: cmd

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: endpointconsole-msi
          path: EndpointConsole.Installer/bin/x64/Release/*.msi
          if-no-files-found: error
